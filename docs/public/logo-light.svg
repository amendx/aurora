<svg xmlns="http://www.w3.org/2000/svg" width="136" height="36" viewBox="0 0 136 36">
  <defs>
    <linearGradient id="icon-top" x1="40%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"  stop-color="#5AC8FA"/>
      <stop offset="55%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#00C8B8"/>
    </linearGradient>
    <linearGradient id="icon-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#007AFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#34E8C0"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#007AFF"/>
      <stop offset="60%"  stop-color="#0088DD"/>
      <stop offset="100%" stop-color="#0055CC"/>
    </linearGradient>
  </defs>

  <!-- Icon glyph (36×36) -->
  <g transform="translate(0,0) scale(0.36)">
    <!-- A body -->
    <path d="M50,6 C52,6 92,68 92,80 L78,80 C78,80 58,45 50,28 C42,45 22,80 22,80 L8,80 C8,68 48,6 50,6 Z" fill="url(#icon-top)"/>
    <!-- Upper wave -->
    <path d="M20,63 Q35,55 50,60 Q65,65 80,57 L80,63 Q65,71 50,66 Q35,61 20,70 Z" fill="white" opacity="0.92"/>
    <!-- Lower wave -->
    <path d="M14,73 Q35,65 52,70 Q70,75 86,66 L86,72 Q70,81 52,76 Q35,71 14,79 Z" fill="white" opacity="0.92"/>
    <!-- Teal accent oval -->
    <ellipse cx="72" cy="82" rx="20" ry="8.5" fill="url(#icon-teal)" opacity="0.88"/>
  </g>

  <!-- "Aurora" wordmark -->
  <text
    x="44" y="25"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="21"
    font-weight="700"
    letter-spacing="-0.4"
    fill="url(#text-grad)"
  >Aurora</text>
</svg>
